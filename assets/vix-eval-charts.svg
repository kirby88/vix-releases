<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="orangeBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="208" y="46" font-size="11" font-weight="700" fill="#6b5b7b" text-anchor="middle" letter-spacing="1.5">TOTAL COST ($)</text>

  <!-- Claude Code bar -->
  <text x="120" y="82" font-size="12" fill="#5a4d6a" text-anchor="end" font-weight="500">Claude Code</text>
  <rect x="128" y="68" width="220" height="20" rx="5" fill="url(#orangeBar)"/>
  <text x="358" y="82" font-size="13" fill="#2d1f3d" font-weight="600" font-family="ui-monospace,Menlo,Consolas,monospace">$12.44</text>

  <!-- Vix bar -->
  <text x="120" y="118" font-size="12" fill="#5a4d6a" text-anchor="end" font-weight="500">Vix</text>
  <rect x="128" y="104" width="118" height="20" rx="5" fill="url(#purpleBar)"/>
  <text x="256" y="118" font-size="13" fill="#2d1f3d" font-weight="600" font-family="ui-monospace,Menlo,Consolas,monospace">$6.64</text>

  <!-- Percentage -->
  <text x="208" y="160" font-size="12" fill="#5a4d6a" text-anchor="middle">
    Vix is <tspan fill="#16a34a" font-weight="700" font-size="14">47%</tspan> cheaper than Claude Code
  </text>

  <!-- Title -->
  <text x="612" y="46" font-size="11" font-weight="700" fill="#6b5b7b" text-anchor="middle" letter-spacing="1.5">TOTAL TIME</text>

  <!-- Claude Code bar -->
  <text x="524" y="82" font-size="12" fill="#5a4d6a" text-anchor="end" font-weight="500">Claude Code</text>
  <rect x="532" y="68" width="200" height="20" rx="5" fill="url(#orangeBar)"/>
  <text x="742" y="82" font-size="13" fill="#2d1f3d" font-weight="600" font-family="ui-monospace,Menlo,Consolas,monospace">64m 06s</text>

  <!-- Vix bar -->
  <text x="524" y="118" font-size="12" fill="#5a4d6a" text-anchor="end" font-weight="500">Vix</text>
  <rect x="532" y="104" width="120" height="20" rx="5" fill="url(#purpleBar)"/>
  <text x="662" y="118" font-size="13" fill="#2d1f3d" font-weight="600" font-family="ui-monospace,Menlo,Consolas,monospace">38m 27s</text>

  <!-- Percentage -->
  <text x="612" y="160" font-size="12" fill="#5a4d6a" text-anchor="middle">
    Vix is <tspan fill="#16a34a" font-weight="700" font-size="14">40%</tspan> faster than Claude Code
  </text>

  <!-- Legend -->
  <rect x="304" y="190" width="10" height="10" rx="2" fill="url(#orangeBar)"/>
  <text x="318" y="199" font-size="10" fill="#6b5b7b">Claude Code</text>
  <rect x="404" y="190" width="10" height="10" rx="2" fill="url(#purpleBar)"/>
  <text x="418" y="199" font-size="10" fill="#6b5b7b">Vix</text>
</svg>
